# Prerequisite
# Set the PUBLIC_REPO_TOKEN
#   - Repo: only the public repo
#   - premissions: Content (read & write), Workflows (read & write)
name: Publish to Public Repo

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check public repo is not ahead of private repo
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          git remote remove public 2>/dev/null || true
          git remote add public https://x-access-token:${PUBLIC_REPO_TOKEN}@github.com/shinglyu/shinglyu.github.io.git
          git fetch public main
          AHEAD=$(git rev-list HEAD..public/main --count)
          echo "Public repo is ahead by $AHEAD commit(s)"
          if [ "$AHEAD" -gt 0 ]; then
            echo "Error: The public repo has $AHEAD commit(s) not present in this repo."
            echo "Resolve the divergence before publishing."
            exit 1
          fi

      - name: Push to public repo
        run: |
          # 'public' remote was added in the previous step and persists in .git/config
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "COMMIT_SHA=$COMMIT_SHA" >> "$GITHUB_ENV"
          git push public main

      - name: Wait 1 minute for GitHub Pages to deploy
        run: sleep 60

      - name: Verify published site contains expected commit hash
        run: |
          echo "Checking for commit $COMMIT_SHA on https://shinglyu.com"
          BODY=$(curl -s --max-time 30 --retry 3 https://shinglyu.com)
          if echo "$BODY" | grep -q "git-commit: $COMMIT_SHA"; then
            echo "Commit $COMMIT_SHA found in live site. Deployment verified!"
          else
            echo "Commit $COMMIT_SHA not found in live site HTML."
            echo "The site may not have deployed yet or the build revision is not embedded."
            exit 1
          fi
